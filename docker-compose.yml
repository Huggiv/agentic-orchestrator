services:
  backend:
    build:
      context: ./backend
    container_name: agent_flow-backend
    env_file:
      - ./.env
    environment:
      - AGENT_FLOW_REPO_BASE_DIR=/tmp/agent_flow-tmp-repos
      - AGENT_FLOW_HISTORY_DB_PATH=/tmp/agent_flow-history/orchestration.db
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - COPILOT_SESSION_STATE_DIR=/root/.copilot/session-state
    ports:
      - "8015:8015"
    volumes:
      - ./.env:/app/.env:ro
      - /home/vithuggi/agent_flow-tmp-repos:/tmp/agent_flow-tmp-repos
      - /home/vithuggi/agent_flow-history:/tmp/agent_flow-history
      - /home/vithuggi/.copilot/agentic-orch:/root/.copilot/session-state

  frontend:
    build:
      context: ./frontend
    container_name: agent_flow-frontend
    ports:
      - "5175:5175"
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      - backend